pre-commit:
  commands:
    docket-validate:
      glob: ".docket/tickets/*.md"
      run: docket validate {staged_files}
      fail_text: "Ticket validation failed. Fix the reported markdown/schema errors, rerun `docket validate`, and recommit. Schema-valid direct edits are auto-repaired."

    docket-ac-check:
      run: |
        TICKET=$(git log -1 --format="%B" 2>/dev/null | grep -oE 'Ticket: TKT-[0-9]+' | awk '{print $2}' || true)
        if [ -n "$TICKET" ]; then
          docket ac check "$TICKET"
        fi
      fail_text: "Acceptance criteria for linked ticket are not all complete."
