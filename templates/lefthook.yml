pre-commit:
  commands:
    docket-validate:
      glob: ".docket/tickets/*.md"
      run: docket validate {staged_files}
      fail_text: "Ticket schema validation failed. Fix errors before committing."

commit-msg:
  commands:
    docket-ac-check:
      run: |
        REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
        MSG_FILE="{1}"
        if [ ! -f "$MSG_FILE" ]; then
          echo "docket: warning: commit message file not found; skipping Ticket trailer checks" >&2
          exit 0
        fi
        TICKETS="$(grep -Eo 'Ticket:[[:space:]]*TKT-[0-9]+' "$MSG_FILE" | sed -E 's/.*(TKT-[0-9]+)$/\1/' | sort -u || true)"
        if [ -z "$TICKETS" ]; then
          exit 0
        fi
        if [ -d "$REPO_ROOT/.git" ]; then
          echo "docket: error: Ticket-linked commits must be created from a dedicated worktree, not the primary checkout" >&2
          exit 1
        fi
        for TICKET in $TICKETS; do
          docket ac check "$TICKET" || exit 1
        done
      fail_text: "Acceptance criteria for linked ticket are not all complete."
